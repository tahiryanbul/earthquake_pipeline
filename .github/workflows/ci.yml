name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify imports
        run: |
          python -c "import importlib, sys; modules = ('pandas','requests','streamlit'); [importlib.import_module(m) for m in modules]; print('imports OK')"
      - name: Pip check
        run: python -m pip check
